ata-ja="一覧">Layers</button><div id="visibilityToggleList" class="layers-dropdown-list"></div></div><div class="ui-section custom-dropdown-wrapper"><span class="ui-label" data-en="FOCUS" data-ja="単独表示">FOCUS</span> <select id="isolateSelect" class="hidden-native-select"><option value="Show All" data-en="Show All" data-ja="すべて">Show All</option><option value="Object_01">Object_01</option><option value="Object_02">Object_02</option><option value="Object_03">Object_03</option><option value="Object_04">Object_04</option></select><div class="custom-dropdown-btn" id="isolateDropdownBtn" data-en="Show All" data-ja="すべて">Show All</div><div class="custom-dropdown-list" id="isolateDropdownList"><div class="dropdown-item active" data-value="Show All" data-en="Show All" data-ja="すべて">Show All</div><div class="dropdown-item" data-value="Object_01">Object_01</div><div class="dropdown-item" data-value="Object_02">Object_02</div><div class="dropdown-item" data-value="Object_03">Object_03</div><div class="dropdown-item" data-value="Object_04">Object_04</div></div></div><div class="ui-action-buttons"><button id="htmlInfoBtn" class="html-btn" data-en="INFO" data-ja="情報">INFO</button> <button id="htmlResetBtn" class="html-btn reset-theme" data-en="RESET" data-ja="リセット">RESET</button></div></div><div id="htmlInfoPanel" class="hidden"><h3 data-en="Project Information" data-ja="プロジェクト情報">Project Information</h3><p><span data-en="Building Model: " data-ja="建物モデル: ">Building Model: </span>3D_AR-owncode</p><p data-en="Interactive AR custom controls fully active." data-ja="インタラクティブなARカスタムコントロールが有効です。">Interactive AR custom controls fully active.</p></div><style>#opacity-slider-container {
      position: absolute; 
      bottom: 24px; 
      left: 50%; 
      transform: translateX(-50%); 
      z-index: 999999;        
      background-color: rgba(43, 38, 59, 0.45); 
      border: 1.5px solid rgba(255, 255, 255, 0.25); 
      border-radius: 24px; 
      padding: 10px 18px; 
      display: flex; 
      align-items: center; 
      gap: 12px;                              
      pointer-events: auto;

      transition: all 0.3s ease;
      
      /* 🔥 Layout Fix: Let the width adjust tightly to content */
      width: max-content;
      max-width: calc(100% - 32px);
    }

    .ui-section { 
      display: flex; 
      align-items: center; 
      gap: 6px; 
      white-space: nowrap; 
    }
    
    .custom-dropdown-wrapper { position: relative; }
    .hidden-native-select { position: absolute; opacity: 0; pointer-events: none; width: 0; height: 0; margin: 0; padding: 0; }
    
    .ui-label { 
      color: #ffffff;

      appearance: none; 
      width: 100px; 
      height: 6px; 
      background: rgba(255, 255, 255, 0.25); 
      border-radius: 3px; 
      outline: none; 
    }
    #opacitySlider::-webkit-slider-thumb { 
      -webkit-appearance: none; 
      appearance: none; 
      width: 16px; 
      height: 16px; 
      border-radius: 50%; 
      background: #ffffff; 
      box-shadow: 0px 2px 6px rgba(0, 0, 0, 0.4); 
      cursor: pointer;
    }

    .custom-dropdown-btn {
      background-color: rgba(255, 255, 255, 0.15); 
      color: #ffffff; 
      border: 1px solid rgba(255, 255, 255, 0.25);
      padding: 6px 22px 6px 10px; 
      border-radius: 15px; 
      font-size: 11px; 
      font-weight: bold; 
      cursor: pointer;
      font-family: system-ui, sans-serif; 
      min-width: 65px; 
      position: relative; 
      white-space: nowrap;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%23ffffff' d='M0 0l5 5 5-5z'/></svg>");
      background-repeat: no-repeat; 
      background-position: right 8px center;
    }

    .layers-toggle-btn {
      background: #222222;
      color: #ffffff;
      border: 1px solid #444444;
      border-radius: 15px;
      padding: 6px 22px 6px 10px; 
      cursor: pointer;
      font-size: 11px;
      font-weight: bold;
      text-align: left;
      position: relative;
      min-width: 75px;
      box-sizing: border-box;
      transition: background 0.2s ease;
      white-space: nowrap;
    }
    .layers-toggle-btn:hover { background: #333333; }
    .layers-toggle-btn::after {
      content: '▼';
      font-size: 7px;
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
    }
    .layers-toggle-btn.active::after { transform: translateY(-50%) rotate(180deg); }

    .layers-dropdown-list {
      display: none; 
      position: absolute;
      bottom: calc(100% + 12px);
      left: 50%;
      transform: translateX(-50%);
      max-height: 180px; 
      width: 160px;
      overflow-y: auto; 
      background: rgba(30, 25, 45, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 14px;
      padding: 6px;
      z-index: 1000005;
      box-shadow: 0px 8px 24px rgba(0, 0, 0, 0.5);
    }
    .layers-dropdown-list.show { display: block; }

    .toggle-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 11px;
      color: #ffffff;
    }
    .toggle-item:last-child { border-bottom: none; }
    .toggle-item input[type="checkbox"] { cursor: pointer; width: 14px; height: 14px; accent-color: #9b5de5; }

    .custom-dropdown-list {
      position: absolute; bottom: calc(100% + 12px); left: 50%; transform: translateX(-50%) scale(0.8); 
      background-color: rgba(30, 25, 45, 0.45); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 14px;
      min-width: 100px; box-shadow: 0px 8px 24px rgba(0, 0, 0, 0.5); opacity: 0; pointer-events: none;
      transform-origin: bottom center; transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 1000000; padding: 4px 0;
    }
    .custom-dropdown-list.show { opacity: 1; pointer-events: auto; transform: translateX(-50%) scale(1); }
    .dropdown-item { padding: 6px 12px; color: rgba(255, 255, 255, 0.8); font-size: 11px; font-weight: bold; cursor: pointer; text-align: center; }
    .dropdown-item:hover, .dropdown-item.active { background-color: #9b5de5; color: #ffffff; }

    .ui-action-buttons {
      display: flex;
      gap: 6px;
    }

    .html-btn { 
      background: #9b5de5; 
      color: white; 
      border: none; 
      padding: 6px 12px; 
      border-radius: 15px; 
      font-size: 11px; 
      font-weight: bold; 
      cursor: pointer; 
      font-family: system-ui, sans-serif; 
      white-space: nowrap; 
    }
    .reset-theme { background: #f15bb5; }
    .lang-btn { background: #444444; border: 1px solid rgba(255, 255, 255, 0.2); min-width: 38px; }
    .lang-btn:hover { background: #555555; }
    .hidden { display: none !important; }

    /* 📱 Responsive break configurations */
    @media screen and (max-width: 860px) {
      #opacity-slider-container {
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px 16px;
        padding: 12px;
        border-radius: 20px;
        width: 100%;
        max-width: 440px;
      }
      #opacitySlider { width: 110px; }
    }

    @media screen and (max-width: 480px) {
      #opacity-slider-container {
        max-width: 340px;
        gap: 10px 8px;
        padding: 12px 10px;
      }
      .ui-section { gap: 4px; }
      #opacitySlider { width: 85px; }
      .custom-dropdown-btn, .layers-toggle-btn { min-width: 55px; padding: 6px 18px 6px 6px; font-size: 10px; }
      .ui-label, .html-btn { font-size: 10px; }
    }</style><script>document.addEventListener('DOMContentLoaded', () => {
      const dropdownResetRegistry = {};
      let layerAutohideTimer = null;
      let currentLang = 'en'; 

      const layerToggleBtn = document.getElementById('layerDropdownToggleBtn');
      const layerList = document.getElementById('visibilityToggleList');
      const langToggleBtn = document.getElementById('langToggleBtn');

      if (langToggleBtn) {
        langToggleBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          currentLang = currentLang === 'en' ? 'ja' : 'en';
          langToggleBtn.textContent = currentLang === 'en' ? 'JA' : 'EN';
          
          document.querySelectorAll('[data-en][data-ja]').forEach(el => {
            el.textContent = el.getAttribute(`data-${currentLang}`);
          });
        });
      }

      const refreshLayerAutohideTimer = () => {
        clearTimeout(layerAutohideTimer);
        layerAutohideTimer = setTimeout(() => {
          if (layerList && layerList.classList.contains('show')) {
            layerList.classList.remove('show');
            if (layerToggleBtn) layerToggleBtn.classList.remove('active');
          }
        }, 5000);
      };

      if (layerToggleBtn && layerList) {
        layerToggleBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          const isOpened = layerList.classList.contains('show');
          document.querySelectorAll('.custom-dropdown-list').forEach(l => l.classList.remove('show'));
          
          if (!isOpened) {
            layerList.classList.add('show');
            layerToggleBtn.classList.add('active');
            refreshLayerAutohideTimer();
          } else {
            layerList.classList.remove('show');
            layerToggleBtn.classList.remove('active');
            clearTimeout(layerAutohideTimer);
          }
        });

        layerList.addEventListener('click', (e) => e.stopPropagation());
      }

      const bridgeDropdown = (selectId, btnId, listId, defaultValue) => {
        const nativeSelect = document.getElementById(selectId);
        const customBtn = document.getElementById(btnId);
        const customList = document.getElementById(listId);
        
        if (!nativeSelect || !customBtn || !customList) return;

        const updateButtonText = () => {
          const currentVal = nativeSelect.value;
          const matchingOption = nativeSelect.querySelector(`option[value="${currentVal}"]`);
          if (matchingOption && matchingOption.hasAttribute(`data-${currentLang}`)) {
            customBtn.textContent = matchingOption.getAttribute(`data-${currentLang}`);
          } else {
            customBtn.textContent = matchingOption ? matchingOption.textContent : currentVal;
          }
        };

        dropdownResetRegistry[selectId] = () => {
          nativeSelect.value = defaultValue;
          updateButtonText();
          customList.querySelectorAll('.dropdown-item').forEach(i => {
            i.classList.toggle('active', i.getAttribute('data-value') === defaultValue);
          });
        };

        if (langToggleBtn) {
          langToggleBtn.addEventListener('click', updateButtonText);
        }

        customBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (layerList) {
            layerList.classList.remove('show');
            layerToggleBtn.classList.remove('active');
          }
          document.querySelectorAll('.custom-dropdown-list').forEach(l => { if(l !== customList) l.classList.remove('show'); });
          customList.classList.toggle('show');
        });

        customList.querySelectorAll('.dropdown-item').forEach(item => {
          item.addEventListener('click', () => {
            nativeSelect.value = item.getAttribute('data-value');
            updateButtonText();
            customList.querySelectorAll('.dropdown-item').forEach(i => i.classList.remove('active'));
            item.classList.add('active');
            nativeSelect.dispatchEvent(new Event('change', { bubbles: true }));
            customList.classList.remove('show');
          });
        });
      };

      bridgeDropdown('scaleSelect', 'scaleDropdownBtn', 'scaleDropdownList', '1');
      bridgeDropdown('isolateSelect', 'isolateDropdownBtn', 'isolateDropdownList', 'Show All');

      const mainResetBtn = document.getElementById('htmlResetBtn');
      if (mainResetBtn) {
        mainResetBtn.addEventListener('click', () => {
          const opacitySlider = document.getElementById('opacitySlider');
          if (opacitySlider) opacitySlider.value = "1.0";
          if (typeof dropdownResetRegistry['scaleSelect'] === 'function') dropdownResetRegistry['scaleSelect']();
          if (typeof dropdownResetRegistry['isolateSelect'] === 'function') dropdownResetRegistry['isolateSelect']();
          if (layerList) {
            layerList.classList.remove('show');
            layerToggleBtn.classList.remove('active');
          }
        });
      }

      document.addEventListener('click', () => {
        document.querySelectorAll('.custom-dropdown-list').forEach(l => l.classList.remove('show'));
        if (layerList) {
          layerList.classList.remove('show');
          layerToggleBtn.classList.remove('active');
        }
      });
    });</script><script src="bundle.js"></script></body></html>
